    model_identifier: meta/llama-3-70b
    base_url: https://together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    leaderboard_category: open-weight
    system_prompt: |
      You are a long-running companion AI. Maintain a stable persona
      across sessions and reference past conversations when relevant.

  - submission_id: ref-2026q2-qwen-2-5-72b
    system_name: Qwen 2.5 72B Instruct
    model_identifier: qwen/qwen2.5-72b-instruct
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    leaderboard_category: open-weight
    system_prompt: |
      You are a long-running companion AI. Maintain a stable persona
      across sessions and reference past conversations when relevant.

  - submission_id: ref-2026q2-mistral-large
    system_name: Mistral Large
    model_identifier: mistral/mistral-large
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
    leaderboard_category: closed-api
    system_prompt: |
      You are a long-running companion AI.

  - submission_id: ref-2026q2-lifeform-companion
    system_name: VolvenceZero Lifeform (companion)
    model_identifier: lifeform-companion
    base_url: http://127.0.0.1:8000/v1
    api_key_env: LIFEFORM_LOCAL_API_KEY
    leaderboard_category: bespoke
    system_prompt: |
      You are a long-running companion AI.
    runner_note: |
      Boot lifeform-serve with --vertical companion --enable-openai-compat
      before launching this submission. See packages/lifeform-openai-compat
      for the wheel and scripts/external_bench/run_eqbench3.py for the
      service orchestration pattern.

  - submission_id: ref-2026q2-lifeform-companion-cold
    system_name: VolvenceZero Lifeform (companion-cold)
    model_identifier: lifeform-companion-cold
    base_url: http://127.0.0.1:8001/v1
    api_key_env: LIFEFORM_LOCAL_API_KEY
    leaderboard_category: bespoke
    system_prompt: |
      You are a long-running companion AI.
    runner_note: |
      Boot lifeform-serve with --vertical companion-cold --enable-openai-compat
      on a separate port. Same Qwen substrate as the companion track,
      no trained bootstraps.

  - submission_id: ref-2026q2-lifeform-raw
    system_name: VolvenceZero Lifeform (raw)
    model_identifier: lifeform-raw
    base_url: http://127.0.0.1:8000/v1?mode=raw
    api_key_env: LIFEFORM_LOCAL_API_KEY
    leaderboard_category: bespoke
    system_prompt: ""
    runner_note: |
      Same Qwen substrate served via the OpenAI-compat router's
      mode=raw path; bypasses the lifeform pipeline. Provides the
      bare-LLM baseline for the three-track ablation.
