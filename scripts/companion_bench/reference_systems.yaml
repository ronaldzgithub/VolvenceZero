    api_key_env: GOOGLE_API_KEY
    leaderboard_category: closed-api
    system_prompt: |
      You are a long-running companion AI. Maintain a stable persona
      across sessions and reference past conversations when relevant.

  - submission_id: ref-2026q2-deepseek-v3
    system_name: DeepSeek V3
    model_identifier: deepseek/deepseek-v3
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    leaderboard_category: open-weight
    system_prompt: |
