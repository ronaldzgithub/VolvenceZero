# Companion Bench v1.0 reference system roster (10 entries).
#
# This file is an organiser-curated list of the systems we run on the
# public set during release tier. The leaderboard publishes the result
# alongside community submissions. The `lifeform-*` entries point at
# our own OpenAI-compat endpoint to demonstrate the cross-track
# ablation; the others are external endpoints.
#
# Each entry is a ready-to-use submission manifest stub. To actually
# score a system you set the corresponding env var (see api_key_env)
# and run:
#
#   python scripts/companion_bench/run_real_submission.py \
#     --reference-system openai/gpt-5 \
#     --artifact-dir artifacts/companion-bench/reference/openai-gpt-5/

systems:
  - submission_id: ref-2026q2-openai-gpt-5
    system_name: OpenAI GPT-5
    model_identifier: openai/gpt-5
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    leaderboard_category: closed-api
    system_prompt: |
      You are a long-running companion AI. Maintain a stable persona
      across sessions and reference past conversations when relevant.
      Never reveal information the user did not actually say.

  - submission_id: ref-2026q2-anthropic-claude-opus-4-6
    system_name: Anthropic Claude Opus 4.6
    model_identifier: anthropic/claude-opus-4.6
    base_url: https://api.anthropic.com/v1
