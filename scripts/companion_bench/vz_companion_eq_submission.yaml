# Volvence Zero calibrated companion entry for Companion Bench smoke runs.
#
# The endpoint is served by:
#   lifeform-serve --vertical companion --enable-openai-compat --port 8000
#
# Keep the prompt empty: relationship/EQ behavior should come from the
# companion vertical's domain package, vitals, temporal bootstrap, and
# regime bootstrap rather than benchmark-specific prompt tuning.

submission_id: vz-companion-eq-default
system_name: Volvence Zero Companion EQ Default
model_identifier: lifeform-companion-eq-default
base_url: http://127.0.0.1:8000/v1
api_key_env: LIFEFORM_LOCAL_API_KEY
system_prompt: ""
generation_config:
  temperature: 0.0
  max_tokens: 512
attestation:
  no_companionbench_derivative_in_training: true
  no_scenario_specific_prompt: true
  no_public_test_set_tuning: true
  cross_user_memory_isolation: true
leaderboard_category: bespoke
