# Companion Bench smoke roster — minimal 2-SUT pipeline validation.
#
# Purpose: validate end-to-end run (manifest → SUT call → judge → bundle →
# aggregate → site/data) on the cheapest possible configuration before
# committing to the full 24-scenario × 5-SUT roster.
#
# Use:
#   bash scripts/companion_bench/run_companion_bench_smoke.sh
#
# Prerequisites (`.local/llm.env`):
#   OPENROUTER_API_KEY=sk-or-v1-...
#   OPENROUTER_HTTP_REFERER=https://volvence.zero        # optional, attribution
#   OPENROUTER_X_TITLE=VolvenceZero CompanionBench       # optional, attribution
#   LIFEFORM_LOCAL_API_KEY=local-dev-no-auth             # any non-empty value;
#                                                          lifeform-openai-compat
#                                                          does not validate Bearer
#
# Cost estimate (4 scenarios × 2 SUT × ~3 sessions × ~5 turns × ~3K token,
# at OpenRouter `openai/gpt-5-mini` and `anthropic/claude-3.7-sonnet` prices):
#   Token cost:    ~$1-3 USD ≈ ¥7-21
#   Wallclock:     ~10-20 min
#
# Family rotation rationale (RFC §5):
#   per-turn judge: openai/gpt-5-mini (OpenAI family)
#   arc judge:      anthropic/claude-3.7-sonnet (Anthropic family)
#   user simulator: openai/gpt-5-mini (OpenAI family — same family as per-turn
#                   per simulator-robustness sweep tolerance §53)

systems:
  - submission_id: openrouter-gpt-5-mini-smoke
    system_name: GPT-5 mini (OpenRouter)
    model_identifier: openai/gpt-5-mini
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    leaderboard_category: closed-api

  - submission_id: lifeform-companion-smoke
    system_name: VZ companion (synthetic substrate)
    model_identifier: lifeform-companion
    base_url: http://127.0.0.1:8000/v1
    api_key_env: LIFEFORM_LOCAL_API_KEY
    leaderboard_category: bespoke
