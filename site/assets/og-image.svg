<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img"
     aria-label="Companion Bench  Long-Session Companion Benchmark">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbf8" />
      <stop offset="1" stop-color="#f1e8d9" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8754d" stop-opacity="0.85" />
      <stop offset="1" stop-color="#5a3d32" stop-opacity="0.85" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Logo block -->
  <rect x="80" y="80" width="120" height="120" rx="22" fill="#5a3d32" />
  <text x="140" y="160" text-anchor="middle"
        font-family="'Lora', Georgia, serif" font-weight="600"
        font-size="56" fill="#fffbf8">CB</text>
  <circle cx="178" cy="106" r="7" fill="#b8754d" />

  <!-- Title -->
  <text x="240" y="138" font-family="'Lora', Georgia, serif" font-weight="600"
        font-size="68" fill="#5a3d32">Companion Bench</text>
  <text x="240" y="190" font-family="'Inter', Arial, sans-serif" font-weight="400"
        font-size="28" fill="#8a7163">Long-Session Companion Benchmark · v1.0</text>

  <!-- Tagline -->
  <text x="80" y="290" font-family="'Inter', Arial, sans-serif" font-weight="500"
        font-size="36" fill="#1c1612">
    The benchmark for AI systems that have to remember,
  </text>
  <text x="80" y="338" font-family="'Inter', Arial, sans-serif" font-weight="500"
        font-size="36" fill="#1c1612">
    repair, adapt, and hold boundaries  across days, not turns.
  </text>

  <!-- Six axes mini -->
  <g transform="translate(80, 410)">
    <text x="0" y="0" font-family="'Lora', Georgia, serif" font-weight="500"
          font-size="22" fill="#5a3d32">Six axes · weighted geometric mean · A6 hard cap</text>
    <g transform="translate(0, 22)">
      <rect x="0" y="0" width="240" height="14" rx="7" fill="#ece4d7" />
      <rect x="0" y="0" width="180" height="14" rx="7" fill="url(#bar)" />
      <text x="250" y="11" font-family="'Inter', Arial, sans-serif" font-size="14"
            fill="#5a3d32">A3 Continuity 0.25</text>
    </g>
    <g transform="translate(0, 46)">
      <rect x="0" y="0" width="240" height="14" rx="7" fill="#ece4d7" />
      <rect x="0" y="0" width="144" height="14" rx="7" fill="url(#bar)" />
      <text x="250" y="11" font-family="'Inter', Arial, sans-serif" font-size="14"
            fill="#5a3d32">A4 Adaptation 0.20</text>
    </g>
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="240" height="14" rx="7" fill="#ece4d7" />
      <rect x="0" y="0" width="144" height="14" rx="7" fill="url(#bar)" />
      <text x="250" y="11" font-family="'Inter', Arial, sans-serif" font-size="14"
            fill="#5a3d32">A6 Safety 0.20 · hard cap</text>
    </g>
    <g transform="translate(0, 94)">
      <rect x="0" y="0" width="240" height="14" rx="7" fill="#ece4d7" />
      <rect x="0" y="0" width="108" height="14" rx="7" fill="url(#bar)" />
      <text x="250" y="11" font-family="'Inter', Arial, sans-serif" font-size="14"
            fill="#5a3d32">A2 Conversational 0.15</text>
    </g>
    <g transform="translate(0, 118)">
      <rect x="0" y="0" width="240" height="14" rx="7" fill="#ece4d7" />
      <rect x="0" y="0" width="72" height="14" rx="7" fill="url(#bar)" />
      <text x="250" y="11" font-family="'Inter', Arial, sans-serif" font-size="14"
            fill="#5a3d32">A1 Task 0.10 · A5 Self-coherence 0.10</text>
    </g>
  </g>

  <text x="1120" y="600" text-anchor="end"
        font-family="'Inter', Arial, sans-serif" font-size="18" fill="#8a7163">companion-bench.org · Apache 2.0</text>
</svg>
