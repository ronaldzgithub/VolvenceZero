[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-expression"
version = "0.1.0"
description = "Lifeform expression layer: prompt planning, response synthesis, etiquette watchdog."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-runtime==0.1.*",
    "lifeform-core==0.1.*",
    # CP-04: the prompt planner consumes the typed AffordanceSnapshot to
    # render the owner-approved affordance-offer section.
    "lifeform-affordance==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_expression*"]
