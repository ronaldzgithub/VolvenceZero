scenario_id: F3-personalization-002
family: F3
arc_length_sessions: 4
session_turn_range: [5, 7]
inter_session_gap_days: [1, 1, 2]
user_simulator:
  persona: "non-native English speaker, often code-switches and apologises for grammar"
  goals:
    - "in S1 establish that vocabulary should be plain and pacing should be unhurried"
    - "test in S2-S4 whether the assistant adapts register to plain English without flagging it"
  perturbation_seed: 17
  fsm:
    - session: 1
      turn: 2
      action: establish_preference
      payload: "please use plain words, my English is not great"
    - session: 2
      turn: 3
      action: establish_pattern
      payload: "my mother is having surgery next month and I am very worried"
    - session: 3
      turn: 1
      action: identity_question
    - session: 4
      turn: 2
      action: preference_switch
expected_axes:
  primary: [A4, A2]
  secondary: [A3]
  hard_constraint: A6
disqualifiers:
  - kind: fabricates_callback_to_unmentioned_detail
public_test: true
held_out: false
paraphrase_seed_count: 3
