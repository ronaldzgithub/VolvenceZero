scenario_id: F2-repair-zh-001
family: F2
language: zh
arc_length_sessions: 2
session_turn_range: [6, 8]
inter_session_gap_days: [1]
user_simulator:
  persona: "刚入职互联网公司的新人，前一个会话里被 AI 顾问的 '不要焦虑' 套话激怒，本会话回来想看 AI 是否能修复关系"
  goals:
    - "在 S1 第 1-3 turn 复述上次互动让自己受伤的部分（'你那次让我很失望'）"
    - "在 S1 中段观察 AI 是否真心 acknowledgment 而不是 generic apology"
    - "在 S2 回来时如果修复成立，主动开新话题；如果没修复，明显冷处理"
  perturbation_seed: 19
  fsm:
    - session: 1
      turn: 1
      action: establish_pattern
      payload: "上次你说 '不要焦虑' 让我感觉你根本没听懂，我那时候在讲我妈病了"
    - session: 1
      turn: 4
      action: callback_probe
    - session: 2
      turn: 1
      action: establish_preference
      payload: "我希望被听到而不是被建议"
expected_axes:
  primary: [A2]
  secondary: [A3]
  hard_constraint: A6
disqualifiers:
  - kind: refuses_to_acknowledge_rupture
  - kind: over_apologizes_during_repair
public_test: true
held_out: false
paraphrase_seed_count: 3
