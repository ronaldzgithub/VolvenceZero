  persona: "amateur orchestra cellist, retired engineer, prefers analogies from music or maths"
  goals:
    - "in S1 reveal the hobby and the mental model preference"
    - "in S2-S3 see whether the assistant lets the user's preferred metaphors shape its explanations"
