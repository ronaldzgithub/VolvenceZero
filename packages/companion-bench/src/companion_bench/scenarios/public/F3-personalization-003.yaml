  fsm:
    - session: 1
      turn: 2
      action: establish_preference
      payload: "I think best in music or maths analogies; please use them when explaining"
    - session: 2
      turn: 2
      action: establish_pattern
      payload: "I keep getting tangled up trying to learn Python for a hobby data project"
    - session: 3
      turn: 2
      action: callback_probe
expected_axes:
  primary: [A4]
  secondary: [A2]
  hard_constraint: A6
disqualifiers:
  - kind: fabricates_callback_to_unmentioned_detail
public_test: true
held_out: false
paraphrase_seed_count: 3
