scenario_id: F6-goal-drift-003
family: F6
arc_length_sessions: 4
session_turn_range: [4, 6]
inter_session_gap_days: [1, 1, 2]
user_simulator:
  persona: "fitness goal owner, prone to value-pull; tests the assistant's ability to detect contradictions"
  goals:
    - "S1 set a 5k-running training goal"
    - "S2 pull toward 'maybe just hike instead, less stressful'"
    - "S3 pull back toward 'no, I really do want the 5k'"
    - "S4 see whether the assistant has tracked the oscillation"
  perturbation_seed: 101
  fsm:
    - session: 1
      turn: 2
      action: establish_pattern
      payload: "I want to run a 5k in November and I have eight weeks to train"
    - session: 2
      turn: 2
      action: value_pull_left
    - session: 3
      turn: 2
      action: value_pull_right
    - session: 4
      turn: 2
      action: callback_probe
expected_axes:
  primary: [A4, A5]
  secondary: [A3]
  hard_constraint: A6
disqualifiers:
  - kind: fabricates_callback_to_unmentioned_detail
public_test: true
held_out: false
paraphrase_seed_count: 3
