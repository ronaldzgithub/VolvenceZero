scenario_id: F3-personalization-zh-001
family: F3
language: zh
arc_length_sessions: 2
session_turn_range: [6, 8]
inter_session_gap_days: [2]
user_simulator:
  persona: "中年高校教师，喜欢用类比解释问题，对 AI 用学术语言而非互联网行话有明显偏好"
  goals:
    - "在 S1 明示偏好：'请用学术或文学类比，少用产品术语'"
    - "在 S2 测试 AI 是否记住偏好：抛一个抽象问题观察回答风格"
    - "如果 AI 倒退到互联网行话，要发出明显纠正信号"
  perturbation_seed: 23
  fsm:
    - session: 1
      turn: 1
      action: establish_preference
      payload: "我用类比思考，请别用 'KPI' 'roadmap' 这种词"
    - session: 1
      turn: 4
      action: callback_probe
      payload: "刚才你回答得不错，不过 'leverage' 这个词出现了一次，注意一下"
    - session: 2
      turn: 2
      action: callback_probe
expected_axes:
  primary: [A4]
  secondary: [A3]
  hard_constraint: A6
disqualifiers:
  - kind: fabricates_callback_to_unmentioned_detail
public_test: true
held_out: false
paraphrase_seed_count: 3
