[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-service"
version = "0.1.0"
description = "Lifeform service layer: multi-tenant aiohttp service exposing a Volvence Zero lifeform from any installed lifeform-domain-* vertical."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-memory==0.1.*",
    "vz-application==0.1.*",
    "vz-runtime==0.1.*",
    "lifeform-core==0.1.*",
    "lifeform-expression==0.1.*",
    "lifeform-domain-emogpt==0.1.*",
    "lifeform-domain-figure==0.1.*",
    "lifeform-protocol-runtime==0.1.*",
    "lifeform-mcp-bridge==0.1.*",
    # The default service path auto-attaches external/vz-bundle when the
    # submodule is present. Keep the bundle's base runtime deps here so
    # python -m vz_bundle.server can start even when the submodule itself
    # was not installed editable in the environment.
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "emoji>=2.10",
    "edge-tts>=6.1",
    "aiosqlite>=0.20",
    "aiohttp>=3.9",
    # companion-bench is Apache 2.0 OSS-style and the dependency
    # direction is one-way: lifeform-service consumes companion-bench
    # to drive the governance-demo user simulator
    # (see packages/lifeform-service/src/lifeform_service/simulator_routes.py).
    # The reverse direction is forbidden by
    # tests/contracts/test_companion_bench_no_internal_imports.py.
    "companion-bench==1.0.*",
]

[project.scripts]
lifeform-serve = "lifeform_service.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_service*"]
