[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dlaas-platform-eval"
version = "0.1.0"
description = "DLaaS platform-tier eval gate. Audience analysis, exam questions + runs, launch license. All readouts (R12 / EVO-2 / OA-1) — no reward / Face gradient ever flows back from these endpoints. See docs/specs/dlaas-platform.md."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "dlaas-platform-contracts==0.1.*",
    "dlaas-platform-registry==0.1.*",
    "dlaas-platform-launcher==0.1.*",
    "aiohttp>=3.9",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["dlaas_platform_eval*"]
