[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vz-contracts"
version = "0.1.0"
description = "Volvence Zero contracts: snapshot/owner/propagator + learned-update primitives (R8, R15)."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
# Phase A1 (oss-relationship-representation-standard.md): the shared
# representation types (semantic snapshots / ToM records / prediction
# signal / embedding seam / Snapshot container) moved to the public
# companion-standard wheel; vz-contracts re-exports them. This is the
# ONLY dependency — vz-contracts still has zero volvence_zero upstream.
dependencies = [
    "companion-standard==0.1.*",
]

# Optional real-autograd backend (volvence_zero.tensor_backend). Pure-Python
# tuple math is the zero-dependency default / rollback baseline; torch is only
# needed when an owner is wired to the autograd backend (WiringLevel.ACTIVE).
[project.optional-dependencies]
torch = [
    "torch>=2.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["volvence_zero*"]
namespaces = true

[tool.setuptools.package-data]
"volvence_zero.runtime" = ["py.typed"]
