[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vz-contracts"
version = "0.1.0"
description = "Volvence Zero contracts: snapshot/owner/propagator + learned-update primitives (R8, R15)."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
include = ["volvence_zero*"]
namespaces = true

[tool.setuptools.package-data]
"volvence_zero.runtime" = ["py.typed"]
