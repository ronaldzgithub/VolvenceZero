[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vz-cognition"
version = "0.1.0"
description = "Volvence Zero cognition plane: dual-track + prediction-error + credit + regime + semantic owners + evaluation + reflection + application snapshot types (R-PE, R7, R9, R10, R11, R12, R14)."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-contracts==0.1.*",
    "vz-substrate==0.1.*",
    "vz-memory==0.1.*",
]

# NOTE: this wheel ships ``volvence_zero.application_types`` (frozen-dataclass
# snapshot definitions consumed by evaluation), but NOT
# ``volvence_zero.application`` (owner code). The owners live in
# ``vz-application``, which depends on this wheel for the type definitions
# plus DualTrackSnapshot / MemorySnapshot. See ``vz-application/README.md``
# for the cycle-break rationale.

[tool.setuptools.packages.find]
where = ["src"]
include = ["volvence_zero*"]
namespaces = true

[tool.setuptools.package-data]
"volvence_zero.semantic_state" = ["prompts/*.md", "schemas/*.json"]
