[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vz-runtime"
version = "0.1.0"
description = "Volvence Zero runtime: Brain / BrainSession / final wiring orchestration."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-contracts==0.1.*",
    "vz-substrate==0.1.*",
    "vz-memory==0.1.*",
    "vz-cognition==0.1.*",
    "vz-application==0.1.*",
    "vz-temporal==0.1.*",
]

[project.optional-dependencies]
hf = [
    "vz-substrate[hf]==0.1.*",
]
torch = [
    "vz-temporal[torch]==0.1.*",
    # Parameter-Efficient Fine-Tuning library, used by
    # ``lifeform_domain_figure.lora_bake_peft.PEFTLoRABakeBackend`` to
    # produce real LoRA artifacts on a frozen base. Lives in the
    # ``torch`` extra because peft itself transitively depends on
    # torch (>=2.0). Installs only when the operator opts in:
    # ``pip install vz-runtime[torch]``. Without it, the figure
    # vertical falls back to ``SyntheticLoRABakeBackend``.
    "peft>=0.11",
]
dev = [
    "pytest",
    "ruff",
]

[project.scripts]
volvence-zero = "volvence_zero.agent.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["volvence_zero*"]
namespaces = true
