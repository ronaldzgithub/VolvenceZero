[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-openai-compat"
version = "0.1.0"
description = "OpenAI Chat Completions compatible adapter that fronts a lifeform-service for external chat-style benchmarks (EQ-Bench 3 / EmpathyBench / Chatbot Arena harnesses, OpenAI Python client, etc.). Read-only facade over lifeform-service.SessionManager — no kernel writeback path."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "lifeform-service==0.1.*",
    "aiohttp>=3.9",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_openai_compat*"]
