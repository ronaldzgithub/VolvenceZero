[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-domain-character"
version = "0.1.0"
description = "Lifeform vertical: reviewed fictional-character bootstrap packages for novel-to-lifeform character internalization."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-application==0.1.*",
    "lifeform-core==0.1.*",
    "lifeform-ingestion==0.1.*",
    # template_adapter implements lifeform_service.templates.VerticalTemplateAdapter
    # so the chat-browser surface can list/load/save character templates.
    # No runtime cycle: lifeform-service imports this vertical lazily via
    # discover_verticals(); declaring the dep this direction matches the
    # actual call direction (service → vertical at runtime, vertical →
    # service Protocol at build time).
    "lifeform-service==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_domain_character*"]

[tool.setuptools.package-data]
"lifeform_domain_character" = [
    "scenarios/*.json",
]
