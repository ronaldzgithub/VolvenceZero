[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-domain-character"
version = "0.1.0"
description = "Lifeform vertical: reviewed fictional-character bootstrap packages for novel-to-lifeform character internalization."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-application==0.1.*",
    "lifeform-core==0.1.*",
    "lifeform-ingestion==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_domain_character*"]

[tool.setuptools.package-data]
"lifeform_domain_character" = [
    "scenarios/*.json",
]
