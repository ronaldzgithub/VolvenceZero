[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-domain-digital-employee"
version = "0.1.0"
description = "Lifeform vertical: B2B digital employee — org-agent and employee-twin domain packages (data-only regime/case/playbook/boundary priors)."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-cognition==0.1.*",
    "vz-application==0.1.*",
    "vz-runtime==0.1.*",
    "lifeform-core==0.1.*",
    "lifeform-domain-emogpt==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_domain_digital_employee*"]
