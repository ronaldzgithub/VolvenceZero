[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vz-memory"
version = "0.1.0"
description = "Volvence Zero memory continuum: CMS + episodic + durable strata (R5, R6)."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-contracts==0.1.*",
    "vz-substrate==0.1.*",
]

# Optional real-autograd backend for CMS bands (Phase 4 of the NL/ETA
# full-autograd migration). Pure-Python CMS remains the default / rollback
# baseline; torch is only required when CMS is wired to WiringLevel.ACTIVE.
[project.optional-dependencies]
torch = [
    "torch>=2.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["volvence_zero*"]
namespaces = true
