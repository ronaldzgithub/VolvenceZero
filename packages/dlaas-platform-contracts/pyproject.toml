[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dlaas-platform-contracts"
version = "0.1.0"
description = "DLaaS platform-tier typed dataclass: InteractionEnvelope / OutputAct / TenantSpec / ShellSpec / AssetSpec / TemplateSpec / ContractSpec / FocusPersonSpec / IdentityLinkSpec / HandoffTicketSpec. Foundation wheel for the dlaas-platform-* tier; zero vz-* / lifeform-* imports. See docs/specs/dlaas-platform.md."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    # vz-contracts is the kernel-level foundation wheel: it carries the
    # typed taxonomies (``DialogueExternalOutcomeKind`` and friends)
    # that platform-tier wire-format enums must reference so wire
    # values map deterministically to kernel kinds. Importing only
    # ``volvence_zero.dialogue_trace`` keeps the platform contracts
    # wheel decoupled from kernel runtime / cognition state — see
    # ``tests/contracts/test_import_boundaries.py``
    # ``DLAAS_PLATFORM_ALLOWED_VZ_PREFIXES``.
    "vz-contracts==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["dlaas_platform_contracts*"]
