[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-core"
version = "0.1.0"
description = "Lifeform core: tick engine, scene/follow-up management, persona base, Lifeform facade orchestrating vz-runtime."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-runtime==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_core*"]
