[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lifeform-domain-figure"
version = "0.1.0"
description = "Lifeform vertical: real-person digital revival from primary-source corpora (papers / letters / lectures / notebooks). Parallel to lifeform-domain-character; produces a FigureArtifactBundle that drives the L1 / L2 / L3 / L4 fidelity ladder."
requires-python = ">=3.11"
authors = [{ name = "Volvence Zero Contributors" }]
license = { text = "Proprietary" }
dependencies = [
    "vz-application==0.1.*",
    "lifeform-core==0.1.*",
    "lifeform-ingestion==0.1.*",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lifeform_domain_figure*"]
