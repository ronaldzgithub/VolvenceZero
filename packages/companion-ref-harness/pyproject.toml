[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "companion-ref-harness"
version = "0.1.0a0"
description = "Companion Bench reference companion harness. Vendor-neutral agent wrapper that gives any OpenAI-compatible model a minimal cross-session memory layer (session summary + retrieval + user-model + episodic), so multi-session benchmarks compare substrate quality on a fair baseline rather than measuring the absence of memory in raw chat-completions. See docs/moving forward/companion-ref-harness-packet.md for the packet."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Companion Bench Contributors" }]
keywords = ["benchmark", "evaluation", "companion-ai", "long-session", "companion-bench", "agent-harness", "reference-baseline"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "aiohttp>=3.9",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-aiohttp>=1.0",
]
embed = [
    "sentence-transformers>=2.7",
]

[project.scripts]
companion-ref-harness = "companion_ref_harness.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["companion_ref_harness*"]
