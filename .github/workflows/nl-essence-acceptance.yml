name: NL Essence Acceptance

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  nl-essence-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run dialogue benchmark regression tests
        run: python -m pytest tests/test_dialogue_benchmark.py -q

      - name: Run NL essence acceptance benchmark
        run: bash scripts/run_nl_essence_acceptance.sh
