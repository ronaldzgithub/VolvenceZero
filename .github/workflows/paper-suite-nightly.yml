name: Paper Suite Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  dialogue-paper-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run dialogue paper suite
        run: bash scripts/run_dialogue_paper_suite.sh artifacts/dialogue-paper-suite paper-suite-small

      - name: Upload dialogue paper suite artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dialogue-paper-suite
          path: artifacts/dialogue-paper-suite

  eta-paper-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run ETA paper suite
        run: bash scripts/run_eta_paper_suite.sh artifacts/eta-paper-suite paper-suite-small

      - name: Upload ETA paper suite artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eta-paper-suite
          path: artifacts/eta-paper-suite
