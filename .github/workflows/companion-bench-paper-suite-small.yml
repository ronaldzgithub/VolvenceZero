name: LSCB Paper Suite — Small (nightly)

# Public-only paper-suite tier. Runs the full 24 public scenarios with
# 1 paraphrase seed × ~5 reference systems against real APIs, every
# night. Cost: ~$200-400/night; gate via repository secret budget.

on:
  schedule:
    - cron: "30 5 * * *"  # 05:30 UTC daily
  workflow_dispatch:

jobs:
  lscb-paper-suite-small:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: github.repository_owner == 'VolvenceZero'  # never run on forks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false  # public-only tier

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install companion-bench wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/companion-bench[test]

      - name: Score reference systems (small tier)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          bash scripts/companion_bench/run_companion_bench_paper_suite_small.sh

      - name: Build leaderboard data
        run: |
          cp artifacts/companion-bench/reference/aggregate_results.json site/leaderboard/data/aggregate_results.json

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: lscb-paper-suite-small-${{ github.run_id }}
          path: |
            artifacts/companion-bench/reference/
            site/leaderboard/data/aggregate_results.json
          retention-days: 30
