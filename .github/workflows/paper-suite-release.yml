name: Paper Suite Release

on:
  workflow_dispatch:

jobs:
  paper-suite-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run dialogue paper suite full
        run: bash scripts/run_dialogue_paper_suite.sh artifacts/dialogue-paper-suite-full paper-suite-full

      - name: Run ETA paper suite full
        run: bash scripts/run_eta_paper_suite.sh artifacts/eta-paper-suite-full paper-suite-full

      - name: Upload release artifact bundles
        uses: actions/upload-artifact@v4
        with:
          name: paper-suite-release-artifacts
          path: |
            artifacts/dialogue-paper-suite-full
            artifacts/eta-paper-suite-full
