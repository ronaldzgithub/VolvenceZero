name: Phase 2 Shadow Evidence Smoke

on:
  push:
    branches:
      - main
      - master
    paths:
      - "packages/vz-cognition/**"
      - "packages/vz-contracts/**"
      - "packages/vz-runtime/**"
      - "scripts/run_phase2_shadow_evidence_smoke.py"
      - "scripts/verify_phase2_shadow_evidence_manifest.py"
      - "tests/contracts/test_phase2_shadow_smoke_script.py"
      - "tests/contracts/test_phase2_shadow_manifest_verifier.py"
      - "docs/specs/evidence_program.md"
      - "docs/moving forward/engineering-convergence-evidence-war.md"
      - ".github/workflows/phase2-shadow-evidence-smoke.yml"
  pull_request:
    paths:
      - "packages/vz-cognition/**"
      - "packages/vz-contracts/**"
      - "packages/vz-runtime/**"
      - "scripts/run_phase2_shadow_evidence_smoke.py"
      - "scripts/verify_phase2_shadow_evidence_manifest.py"
      - "tests/contracts/test_phase2_shadow_smoke_script.py"
      - "tests/contracts/test_phase2_shadow_manifest_verifier.py"
      - "docs/specs/evidence_program.md"
      - "docs/moving forward/engineering-convergence-evidence-war.md"
      - ".github/workflows/phase2-shadow-evidence-smoke.yml"

jobs:
  phase2-shadow-evidence-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run phase2 artifact contract tests
        run: |
          python -m pytest \
            tests/contracts/test_phase2_shadow_smoke_script.py \
            tests/contracts/test_phase2_shadow_manifest_verifier.py \
            -q

      - name: Generate synthetic phase2 shadow evidence
        run: |
          python scripts/run_phase2_shadow_evidence_smoke.py \
            --synthetic-runner \
            --case-limit 1 \
            --output-dir artifacts/phase2-shadow-evidence-smoke

      - name: Verify phase2 shadow evidence manifest
        run: |
          python scripts/verify_phase2_shadow_evidence_manifest.py \
            artifacts/phase2-shadow-evidence-smoke/phase2_shadow_evidence_manifest.json

      - name: Upload phase2 shadow evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase2-shadow-evidence-smoke-${{ github.run_id }}
          path: artifacts/phase2-shadow-evidence-smoke
          retention-days: 14
