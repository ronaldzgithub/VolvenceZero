name: Companion Bench CI Smoke

# PR gate for the Companion Bench harness. Public-only run with deterministic
# fakes; never touches the held-out submodule, so external
# contributors and forks all pass through cleanly.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "packages/companion-bench/**"
      - "tests/contracts/test_companion_bench_no_internal_imports.py"
      - "scripts/companion_bench/**"
      - "site/leaderboard/**"
      - ".github/workflows/companion-bench-ci-smoke.yml"
  pull_request:
    paths:
      - "packages/companion-bench/**"
      - "tests/contracts/test_companion_bench_no_internal_imports.py"
      - "scripts/companion_bench/**"
      - "site/leaderboard/**"
      - ".github/workflows/companion-bench-ci-smoke.yml"

jobs:
  companionbench-ci-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false  # NEVER pull held-out on PR runs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install companion-bench wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/companion-bench[test]

      - name: Run companion-bench unit tests
        run: python -m pytest packages/companion-bench/tests -q

      - name: Run no-internal-imports contract test
        run: python -m pytest tests/contracts/test_companion_bench_no_internal_imports.py -q

      - name: List public scenarios
        run: python -m companion_bench.cli list-scenarios

      - name: Public scenario hash drift check
        run: |
          python scripts/companion_bench/emit_scenario_hashes.py --output /tmp/regen_hashes.txt
          # Strip comment lines from the committed file before diff;
          # the comment header is informational, not part of the hash
          # contract.
          diff <(grep -v '^#' docs/external/companion-bench-public-scenario-hashes.txt | grep -v '^$') \
               <(grep -v '^#' /tmp/regen_hashes.txt | grep -v '^$') \
            && echo "scenario hash table is up to date" \
            || (echo "::error::docs/external/companion-bench-public-scenario-hashes.txt drifted; regenerate via scripts/companion_bench/emit_scenario_hashes.py" && exit 1)

      - name: Smoke run (one family, deterministic fakes)
        run: |
          python -m companion_bench.cli smoke \
            --family F2 \
            --artifact-dir artifacts/companion-bench/ci-smoke \
            --summary artifacts/companion-bench/ci-smoke/summary.json
          test -s artifacts/companion-bench/ci-smoke/summary.json

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: companionbench-ci-smoke-${{ github.run_id }}
          path: artifacts/companion-bench/ci-smoke
          retention-days: 14
